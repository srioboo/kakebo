# SonarQube Configuration for Kakebo Backend
# This file contains the SonarQube configuration for the project

# Project Key and Name
sonar.projectKey=kakebo-backend
sonar.projectName=Kakebo Backend
sonar.projectVersion=0.0.1-SNAPSHOT

# Source and Test Directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Java-specific settings
sonar.java.source=25
sonar.java.target=25
sonar.java.binaries=target/classes
sonar.java.libraries=target/classes

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage Reports (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusions
sonar.exclusions=**/generated-sources/**,**/generated-test-sources/**

# Code Coverage Exclusions
sonar.coverage.exclusions=**/*Test.java,**/*Tests.java,**/config/**,**/dto/**

# Minimum test coverage
sonar.tests=src/test/java

# Code Smells and Issues
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S3740
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S6813
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*

# SonarQube Server URL (optional, can be overridden with -D flag)
# sonar.host.url=http://localhost:9000
# sonar.login=your-token-here

